<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Obras - Seguimiento</title>
    <style>
        /* Estilos generales */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 40px 20px; 
            color: #333; 
        }
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .header-title { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 40px; 
            font-size: 32px;
        }

        /* Cuadrícula de tarjetas */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; 
        }
        .card { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
            border-top: 5px solid #3498db; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .card.disabled { 
            border-top-color: #95a5a6; 
        }
        
        /* Textos de la tarjeta */
        .title { 
            font-size: 20px; 
            font-weight: bold; 
            margin: 0 0 5px 0; 
            color: #2c3e50; 
        }
        .location { 
            color: #7f8c8d; 
            font-size: 14px; 
            margin-bottom: 25px; 
            display: block;
        }

        /* Botones */
        .btn { 
            display: inline-block; 
            padding: 12px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            cursor: pointer; 
            border: none; 
            font-size: 14px; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.3s; 
        }
        .btn-active { 
            background: #2980b9; 
            color: white; 
        }
        .btn-active:hover { 
            background: #1f6391; 
        }
        .btn-disabled { 
            background: #ecf0f1; 
            color: #7f8c8d; 
        }
        .btn-disabled:hover { 
            background: #bdc3c7; 
            color: #2c3e50; 
        }

        /* Estilos de la Ventana Emergente (Modal) */
        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            backdrop-filter: blur(3px);
        }
        .modal { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 15px; 
            text-align: center; 
            max-width: 350px; 
            width: 90%; 
            animation: fadeIn 0.3s ease-out; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.9); } 
            to { opacity: 1; transform: scale(1); } 
        }
        .modal-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .modal h3 { 
            margin: 0 0 10px 0; 
            color: #2c3e50; 
        }
        .modal p { 
            color: #555; 
            font-size: 15px; 
            margin-bottom: 25px; 
            line-height: 1.5; 
        }
        .close-btn { 
            background: #34495e; 
            color: white; 
            padding: 10px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: background 0.3s;
        }
        .close-btn:hover {
            background: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header-title">Portafolio de Obras</h1>
        
        <div class="grid">
            <div class="card">
                <div>
                    <h2 class="title">Campos del Sur II</h2>
                    <span class="location">📍 Renaico</span>
                </div>
                <a href="mapa_generado.html" class="btn btn-active">Ver Avance</a>
            </div>

            <div class="card disabled">
                <div>
                    <h2 class="title">Agua Viva</h2>
                    <span class="location">📍 Chol Chol</span>
                </div>
                <button class="btn btn-disabled" onclick="openModal('Agua Viva')">Ver Avance</button>
            </div>

            <div class="card disabled">
                <div>
                    <h2 class="title">Los Copihues y Los Canelos</h2>
                    <span class="location">📍 Gorbea</span>
                </div>
                <button class="btn btn-disabled" onclick="openModal('Los Copihues y Los Canelos')">Ver Avance</button>
            </div>

            <div class="card disabled">
                <div>
                    <h2 class="title">Los Kiwis</h2>
                    <span class="location">📍 Chol Chol</span>
                </div>
                <button class="btn btn-disabled" onclick="openModal('Los Kiwis')">Ver Avance</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="myModal">
        <div class="modal">
            <div class="modal-icon">🚧</div>
            <h3>Módulo en Desarrollo</h3>
            <p>El seguimiento de avance para <strong id="modal-obra-name">esta obra</strong> está siendo configurado. Estará disponible próximamente.</p>
            <button class="close-btn" onclick="closeModal()">Entendido</button>
        </div>
    </div>

    <script>
        // Función para abrir la ventana emergente con el nombre de la obra correspondiente
        function openModal(obraName) {
            document.getElementById('modal-obra-name').innerText = obraName;
            document.getElementById('myModal').style.display = 'flex';
        }

        // Función para cerrar la ventana emergente
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }

        // Cerrar el modal si se hace clic fuera de la caja blanca
        window.onclick = function(event) {
            const modalOverlay = document.getElementById('myModal');
            if (event.target == modalOverlay) {
                closeModal();
            }
        }
    </script>
</body>

</html>
